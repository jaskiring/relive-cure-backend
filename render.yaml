services:
  - type: web
    name: relive-cure-backend
    env: node
    buildCommand: PUPPETEER_CACHE_DIR=/opt/render/.cache/puppeteer npm install && PUPPETEER_CACHE_DIR=/opt/render/.cache/puppeteer npx puppeteer browsers install chrome
    startCommand: node server/index.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PUPPETEER_CACHE_DIR
        value: "/opt/render/.cache/puppeteer"
      - key: CRM_FORM_URL
        value: "https://www.refrens.com/app/relivecure/leads/new"
